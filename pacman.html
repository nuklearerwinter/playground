<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pacman</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    #hud {
      display: flex;
      gap: 40px;
      font-size: 20px;
      padding: 10px;
      color: #ffcc00;
      letter-spacing: 2px;
    }
    #hud span b { color: #fff; }
    canvas {
      background: #000;
      border: 2px solid #1a1aff;
      box-shadow: 0 0 20px #1a1aff55;
      image-rendering: pixelated;
    }
    #msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      color: #ffcc00;
      text-shadow: 0 0 10px #000;
      pointer-events: none;
      display: none;
      text-align: center;
    }
    #hint {
      margin-top: 10px;
      color: #888;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <span>SCORE <b id="score">0</b></span>
    <span>HIGH <b id="high">0</b></span>
    <span>LIVES <b id="lives">3</b></span>
  </div>
  <canvas id="game" width="448" height="496"></canvas>
  <div id="msg"></div>
  <div id="hint">Pfeiltasten / WASD bewegen &nbsp;·&nbsp; Enter = Start/Neustart</div>

<script>
(() => {
  const TILE = 16;
  const COLS = 28;
  const ROWS = 31;

  // Map legend:
  // # wall, . dot, o power pellet, space = empty, - ghost door, T tunnel marker
  const MAP = [
    "############################",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#o####.#####.##.#####.####o#",
    "#.####.#####.##.#####.####.#",
    "#..........................#",
    "#.####.##.########.##.####.#",
    "#.####.##.########.##.####.#",
    "#......##....##....##......#",
    "######.##### ## #####.######",
    "     #.##### ## #####.#     ",
    "     #.##          ##.#     ",
    "     #.## ###--### ##.#     ",
    "######.## #      # ##.######",
    "T     .   #      #   .     T",
    "######.## #      # ##.######",
    "     #.## ######## ##.#     ",
    "     #.##          ##.#     ",
    "     #.## ######## ##.#     ",
    "######.## ######## ##.######",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#.####.#####.##.#####.####.#",
    "#o..##................##..o#",
    "###.##.##.########.##.##.###",
    "###.##.##.########.##.##.###",
    "#......##....##....##......#",
    "#.##########.##.##########.#",
    "#.##########.##.##########.#",
    "#..........................#",
    "############################",
  ];

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const highEl = document.getElementById("high");
  const livesEl = document.getElementById("lives");
  const msgEl = document.getElementById("msg");

  // Build grid
  const grid = MAP.map(row => row.split(""));

  function tileAt(c, r) {
    if (r < 0 || r >= ROWS) return "#";
    if (c < 0 || c >= COLS) return " ";
    return grid[r][c];
  }
  function isWall(c, r) {
    const t = tileAt(c, r);
    return t === "#" || t === "-";
  }
  function isGhostDoor(c, r) {
    return tileAt(c, r) === "-";
  }

  // Count dots for win condition
  let totalDots = 0;
  for (const row of grid) for (const ch of row) if (ch === "." || ch === "o") totalDots++;
  let dotsLeft = totalDots;

  let score = 0;
  let high = +(localStorage.getItem("pac_high") || 0);
  let lives = 3;
  let state = "ready"; // ready, playing, dying, won, lost
  let stateTimer = 0;
  highEl.textContent = high;

  // Directions
  const DIR = {
    none:  { x:  0, y:  0 },
    left:  { x: -1, y:  0 },
    right: { x:  1, y:  0 },
    up:    { x:  0, y: -1 },
    down:  { x:  0, y:  1 },
  };
  function oppositeDir(d) {
    if (d === "left") return "right";
    if (d === "right") return "left";
    if (d === "up") return "down";
    if (d === "down") return "up";
    return "none";
  }

  // Entity uses pixel position. Speed in px/frame.
  function makeEntity(col, row) {
    return {
      x: col * TILE + TILE / 2,
      y: row * TILE + TILE / 2,
      dir: "none",
      nextDir: "none",
      speed: 1.6,
    };
  }

  const pac = makeEntity(13.5, 23);
  pac.x = 14 * TILE; // between 13 and 14
  pac.dir = "left";
  pac.nextDir = "left";
  pac.speed = 1.8;
  pac.mouth = 0;

  // Ghosts: classic 4 with different behaviors
  const GHOSTS = [
    { name: "blinky", color: "#ff2b2b", home: [13.5, 11], scatter: [25,  0] },
    { name: "pinky",  color: "#ffb8ff", home: [13.5, 14], scatter: [ 2,  0] },
    { name: "inky",   color: "#00ffff", home: [11.5, 14], scatter: [27, 30] },
    { name: "clyde",  color: "#ffb852", home: [15.5, 14], scatter: [ 0, 30] },
  ];
  const ghosts = GHOSTS.map((g, i) => {
    const e = makeEntity(g.home[0], g.home[1]);
    e.x = g.home[0] * TILE;
    e.y = g.home[1] * TILE + TILE / 2;
    e.dir = i === 0 ? "left" : "up";
    e.nextDir = e.dir;
    e.speed = 1.5;
    e.name = g.name;
    e.color = g.color;
    e.scatterTarget = g.scatter;
    e.mode = "scatter"; // scatter, chase, frightened, eaten
    e.inHouse = i !== 0; // blinky starts outside
    e.releaseAt = i * 180; // frames until release
    return e;
  });

  let frightTimer = 0;
  let globalTick = 0;
  let modeTimer = 0;
  let globalMode = "scatter";
  // Scatter/Chase cycle (frames at 60fps): 7s,20s,7s,20s,5s,20s,5s,infinite
  const MODES = [
    { mode: "scatter", frames: 7 * 60 },
    { mode: "chase",   frames: 20 * 60 },
    { mode: "scatter", frames: 7 * 60 },
    { mode: "chase",   frames: 20 * 60 },
    { mode: "scatter", frames: 5 * 60 },
    { mode: "chase",   frames: 20 * 60 },
    { mode: "scatter", frames: 5 * 60 },
    { mode: "chase",   frames: Infinity },
  ];
  let modeIndex = 0;

  // Input
  const keyToDir = {
    ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down",
    a: "left", d: "right", w: "up", s: "down",
    A: "left", D: "right", W: "up", S: "down",
  };
  window.addEventListener("keydown", (e) => {
    if (keyToDir[e.key]) {
      pac.nextDir = keyToDir[e.key];
      e.preventDefault();
    }
    if (e.key === "Enter") {
      if (state === "ready") startGame();
      else if (state === "won" || state === "lost") resetAll();
    }
  });

  function centered(e) {
    const cx = (e.x - TILE / 2) / TILE;
    const cy = (e.y - TILE / 2) / TILE;
    const col = Math.round(cx);
    const row = Math.round(cy);
    const atCenter = Math.abs(cx - col) < 0.05 && Math.abs(cy - row) < 0.05;
    return { col, row, atCenter };
  }

  function canMove(col, row, dir, allowDoor = false) {
    const d = DIR[dir];
    const nc = col + d.x;
    const nr = row + d.y;
    if (isGhostDoor(nc, nr)) return allowDoor;
    return !isWall(nc, nr);
  }

  function moveEntity(e, allowDoor = false) {
    const { col, row, atCenter } = centered(e);

    // Tunnel wrap
    if (e.x < -TILE / 2) e.x = COLS * TILE + TILE / 2;
    if (e.x > COLS * TILE + TILE / 2) e.x = -TILE / 2;

    if (atCenter) {
      // Snap
      e.x = col * TILE + TILE / 2;
      e.y = row * TILE + TILE / 2;

      // Try nextDir
      if (e.nextDir !== "none" && canMove(col, row, e.nextDir, allowDoor)) {
        e.dir = e.nextDir;
      }
      // If current dir blocked, stop
      if (!canMove(col, row, e.dir, allowDoor)) {
        e.dir = "none";
      }
    }

    const d = DIR[e.dir];
    e.x += d.x * e.speed;
    e.y += d.y * e.speed;
  }

  // Ghost AI: choose at each tile intersection
  function ghostChooseDir(g, targetCol, targetRow) {
    const { col, row, atCenter } = centered(g);
    if (!atCenter) return;

    e_snap: {
      g.x = col * TILE + TILE / 2;
      g.y = row * TILE + TILE / 2;
    }

    const opp = oppositeDir(g.dir);
    const options = [];
    for (const d of ["up", "left", "down", "right"]) {
      if (d === opp) continue;
      const dv = DIR[d];
      const nc = col + dv.x;
      const nr = row + dv.y;
      if (isWall(nc, nr)) continue;
      if (isGhostDoor(nc, nr) && g.mode !== "eaten" && !g.inHouse) continue;
      options.push({ dir: d, nc, nr });
    }
    if (options.length === 0) {
      g.dir = opp;
      return;
    }
    if (g.mode === "frightened") {
      // random
      const pick = options[Math.floor(Math.random() * options.length)];
      g.dir = pick.dir;
      return;
    }
    // Choose the option that minimizes distance to target
    let best = options[0];
    let bestDist = Infinity;
    for (const o of options) {
      const dx = o.nc - targetCol;
      const dy = o.nr - targetRow;
      const dist = dx * dx + dy * dy;
      if (dist < bestDist) {
        bestDist = dist;
        best = o;
      }
    }
    g.dir = best.dir;
  }

  function ghostTarget(g) {
    if (g.mode === "eaten") {
      return [13, 14]; // home entrance
    }
    if (g.mode === "scatter") {
      return g.scatterTarget;
    }
    // chase
    const pc = Math.floor(pac.x / TILE);
    const pr = Math.floor(pac.y / TILE);
    if (g.name === "blinky") return [pc, pr];
    if (g.name === "pinky") {
      const d = DIR[pac.dir];
      return [pc + d.x * 4, pr + d.y * 4];
    }
    if (g.name === "inky") {
      const d = DIR[pac.dir];
      const tx = pc + d.x * 2;
      const ty = pr + d.y * 2;
      const blinky = ghosts[0];
      const bc = Math.floor(blinky.x / TILE);
      const br = Math.floor(blinky.y / TILE);
      return [tx + (tx - bc), ty + (ty - br)];
    }
    if (g.name === "clyde") {
      const dx = pc - Math.floor(g.x / TILE);
      const dy = pr - Math.floor(g.y / TILE);
      if (dx * dx + dy * dy > 64) return [pc, pr];
      return g.scatterTarget;
    }
    return [pc, pr];
  }

  function updateGhost(g) {
    // In-house behavior: bob up/down then exit
    if (g.inHouse) {
      g.releaseAt--;
      // bob
      const homeY = g.y;
      if (g.dir === "up" && tileAt(Math.round((g.x - TILE/2)/TILE), Math.round((g.y - TILE/2)/TILE) - 1) === "#") g.dir = "down";
      if (g.dir === "down" && tileAt(Math.round((g.x - TILE/2)/TILE), Math.round((g.y - TILE/2)/TILE) + 1) === "#") g.dir = "up";
      if (g.dir !== "up" && g.dir !== "down") g.dir = "up";
      g.y += (g.dir === "up" ? -1 : 1) * 0.5;
      if (g.releaseAt <= 0) {
        // Snap to door column, move up through door
        g.x = 13.5 * TILE;
        g.y = 14 * TILE + TILE / 2;
        g.inHouse = false;
        g.dir = "up";
        g.nextDir = "up";
      }
      return;
    }

    // Speed
    if (g.mode === "frightened") g.speed = 1.1;
    else if (g.mode === "eaten") g.speed = 3.0;
    else g.speed = 1.5;

    // If eaten and back at house entrance, revive
    const gc = Math.round((g.x - TILE/2) / TILE);
    const gr = Math.round((g.y - TILE/2) / TILE);
    if (g.mode === "eaten" && gc === 13 && gr === 14) {
      g.mode = globalMode;
      g.speed = 1.5;
    }

    const [tc, tr] = ghostTarget(g);
    ghostChooseDir(g, tc, tr);
    moveEntity(g, g.mode === "eaten");
  }

  function updatePac() {
    pac.mouth = (pac.mouth + 0.2) % (Math.PI);
    moveEntity(pac);

    const col = Math.floor(pac.x / TILE);
    const row = Math.floor(pac.y / TILE);
    const t = tileAt(col, row);
    if (t === ".") {
      grid[row][col] = " ";
      score += 10;
      dotsLeft--;
    } else if (t === "o") {
      grid[row][col] = " ";
      score += 50;
      dotsLeft--;
      frightTimer = 7 * 60;
      for (const g of ghosts) {
        if (g.mode !== "eaten" && !g.inHouse) {
          g.mode = "frightened";
          g.dir = oppositeDir(g.dir);
        }
      }
    }
    if (dotsLeft <= 0) {
      state = "won";
      stateTimer = 180;
      msgEl.textContent = "YOU WIN!";
      msgEl.style.display = "block";
    }

    // Collision with ghosts
    for (const g of ghosts) {
      const dx = g.x - pac.x;
      const dy = g.y - pac.y;
      if (dx * dx + dy * dy < (TILE * 0.7) ** 2) {
        if (g.mode === "frightened") {
          g.mode = "eaten";
          score += 200;
        } else if (g.mode !== "eaten") {
          die();
          return;
        }
      }
    }
  }

  function die() {
    lives--;
    state = "dying";
    stateTimer = 90;
  }

  function resetPositions() {
    pac.x = 14 * TILE;
    pac.y = 23 * TILE + TILE / 2;
    pac.dir = "left";
    pac.nextDir = "left";
    for (let i = 0; i < ghosts.length; i++) {
      const g = ghosts[i];
      const h = GHOSTS[i];
      g.x = h.home[0] * TILE;
      g.y = h.home[1] * TILE + TILE / 2;
      g.dir = i === 0 ? "left" : "up";
      g.nextDir = g.dir;
      g.inHouse = i !== 0;
      g.releaseAt = i * 180;
      g.mode = "scatter";
    }
    frightTimer = 0;
    modeIndex = 0;
    modeTimer = 0;
    globalMode = "scatter";
  }

  function resetAll() {
    // Rebuild dots
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) grid[r][c] = MAP[r][c];
    }
    dotsLeft = totalDots;
    score = 0;
    lives = 3;
    resetPositions();
    state = "ready";
    msgEl.style.display = "none";
  }

  function startGame() {
    state = "playing";
    msgEl.style.display = "none";
  }

  // Drawing
  function drawMaze() {
    // Walls - render grid cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        const x = c * TILE;
        const y = r * TILE;
        if (t === "#") {
          // Rounded-ish wall block with inner line
          ctx.fillStyle = "#1a1aff";
          ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
          // connect to neighbors
          if (tileAt(c - 1, r) === "#") ctx.fillRect(x, y + 2, 3, TILE - 4);
          if (tileAt(c + 1, r) === "#") ctx.fillRect(x + TILE - 3, y + 2, 3, TILE - 4);
          if (tileAt(c, r - 1) === "#") ctx.fillRect(x + 2, y, TILE - 4, 3);
          if (tileAt(c, r + 1) === "#") ctx.fillRect(x + 2, y + TILE - 3, TILE - 4, 3);
        } else if (t === "-") {
          ctx.fillStyle = "#ffb8ff";
          ctx.fillRect(x, y + TILE/2 - 1, TILE, 2);
        } else if (t === ".") {
          ctx.fillStyle = "#ffcc99";
          ctx.fillRect(x + TILE/2 - 1, y + TILE/2 - 1, 2, 2);
        } else if (t === "o") {
          ctx.fillStyle = "#ffcc99";
          ctx.beginPath();
          ctx.arc(x + TILE/2, y + TILE/2, 4 + Math.sin(globalTick * 0.2) * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  function drawPac() {
    const mouth = Math.abs(Math.sin(pac.mouth)) * 0.35 + 0.05;
    let angle = 0;
    if (pac.dir === "right") angle = 0;
    else if (pac.dir === "down") angle = Math.PI / 2;
    else if (pac.dir === "left") angle = Math.PI;
    else if (pac.dir === "up") angle = -Math.PI / 2;

    ctx.save();
    ctx.translate(pac.x, pac.y);
    ctx.rotate(angle);
    ctx.fillStyle = "#ffdf00";
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, TILE * 0.55, mouth * Math.PI, (2 - mouth) * Math.PI);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawGhost(g) {
    const x = g.x, y = g.y;
    const r = TILE * 0.55;
    let color = g.color;
    if (g.mode === "frightened") {
      color = frightTimer < 120 && Math.floor(frightTimer / 15) % 2 === 0 ? "#ffffff" : "#2121ff";
    }
    if (g.mode === "eaten") {
      // Just eyes
      drawGhostEyes(x, y, g.dir);
      return;
    }
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y - 1, r, Math.PI, 0);
    ctx.lineTo(x + r, y + r - 2);
    // Wavy bottom
    const wobble = Math.floor(globalTick / 8) % 2;
    const steps = 4;
    for (let i = 0; i < steps; i++) {
      const x1 = x + r - (r * 2 / steps) * i - (r / steps);
      const yOff = ((i + wobble) % 2 === 0) ? 0 : -r * 0.3;
      ctx.lineTo(x1, y + r - 2 + yOff);
    }
    ctx.lineTo(x - r, y + r - 2);
    ctx.closePath();
    ctx.fill();

    if (g.mode === "frightened") {
      // scared face
      ctx.fillStyle = "#fff";
      ctx.fillRect(x - 4, y - 2, 2, 2);
      ctx.fillRect(x + 2, y - 2, 2, 2);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = -5; i <= 5; i += 2) {
        ctx.moveTo(x + i, y + 4);
        ctx.lineTo(x + i + 1, y + 3);
      }
      ctx.stroke();
    } else {
      drawGhostEyes(x, y, g.dir);
    }
  }

  function drawGhostEyes(x, y, dir) {
    const look = DIR[dir] || DIR.none;
    const ex = look.x * 1.6;
    const ey = look.y * 1.6;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(x - 3, y - 1, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 3, y - 1, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#1a1aff";
    ctx.beginPath(); ctx.arc(x - 3 + ex, y - 1 + ey, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 3 + ex, y - 1 + ey, 1.2, 0, Math.PI * 2); ctx.fill();
  }

  function updateMode() {
    if (frightTimer > 0) {
      frightTimer--;
      if (frightTimer === 0) {
        for (const g of ghosts) if (g.mode === "frightened") g.mode = globalMode;
      }
      return;
    }
    modeTimer++;
    const cur = MODES[modeIndex];
    if (modeTimer >= cur.frames) {
      modeIndex = Math.min(modeIndex + 1, MODES.length - 1);
      modeTimer = 0;
      globalMode = MODES[modeIndex].mode;
      for (const g of ghosts) {
        if (g.mode === "scatter" || g.mode === "chase") {
          g.mode = globalMode;
          g.dir = oppositeDir(g.dir);
        }
      }
    }
  }

  function loop() {
    globalTick++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawMaze();

    if (state === "ready") {
      drawPac();
      for (const g of ghosts) drawGhost(g);
      ctx.fillStyle = "#ffcc00";
      ctx.font = "18px 'Courier New'";
      ctx.textAlign = "center";
      ctx.fillText("READY!  —  Enter zum Starten", canvas.width/2, 17 * TILE + 4);
    } else if (state === "playing") {
      updateMode();
      updatePac();
      if (state === "playing") {
        for (const g of ghosts) updateGhost(g);
      }
      drawPac();
      for (const g of ghosts) drawGhost(g);
    } else if (state === "dying") {
      drawMaze();
      // Pac death animation
      const t = 1 - stateTimer / 90;
      ctx.save();
      ctx.translate(pac.x, pac.y);
      ctx.fillStyle = "#ffdf00";
      ctx.beginPath();
      const open = t * Math.PI;
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, TILE * 0.55, open, Math.PI * 2 - open);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      stateTimer--;
      if (stateTimer <= 0) {
        if (lives <= 0) {
          state = "lost";
          msgEl.textContent = "GAME OVER\nEnter = neu";
          msgEl.style.display = "block";
        } else {
          resetPositions();
          state = "ready";
          msgEl.style.display = "none";
        }
      }
    } else if (state === "won" || state === "lost") {
      for (const g of ghosts) drawGhost(g);
    }

    // HUD
    if (score > high) {
      high = score;
      localStorage.setItem("pac_high", String(high));
    }
    scoreEl.textContent = score;
    highEl.textContent = high;
    livesEl.textContent = lives;

    requestAnimationFrame(loop);
  }

  resetAll();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
